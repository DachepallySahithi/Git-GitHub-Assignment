<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Student Registration</h1>

<form action="/submit" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Enter Name"
        required>

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

</body>
</html>
