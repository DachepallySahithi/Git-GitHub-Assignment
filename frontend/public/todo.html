<!DOCTYPE html>
<html>
<head>
    <title>To Do Form</title>
</head>
<body>

    <h2>To Do Item Form</h2>

    <form action="/submittodoitem" method="POST">

        <label>Item Name:</label>
        <input type="text" name="itemName" required>
        <br><br>

        <label>Item Description:</label>
        <input type="text" name="itemDescription" required>
        <br><br>

        <label>Item ID</label>
        <input type="text" name="itemId" required>
        <br><br>

        <label>Item UUID</label>
        <input type="text" name="itemUUID" required>

        <br><br>

        <label>Item Hash</label>
        <input type="text" name="itemHash" required>

        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
